services:

  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - back_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  migration_runner:
    build:
      context: .
      target: final
    command: python migrations/run_migrations.py
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/app_db
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - back_net
    restart: "no"

  seed_runner:
    build:
      context: .
      target: final
    command: python seed/run_seed.py
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/app_db
      PYTHONPATH: /app
    depends_on:
      migration_runner:
        condition: service_completed_successfully
    volumes:
      - seed_output:/seed_output
    networks:
      - back_net
    restart: "no"

  app:
    build:
      context: .
      target: final
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/app_db
      PYTHONPATH: /app
    depends_on:
      db:
        condition: service_healthy
      seed_runner:
        condition: service_completed_successfully
    networks:
      - front_net
      - back_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - front_net

networks:
  front_net:
  back_net:

volumes:
  db_data:
  nginx_logs:
  seed_output:
